name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: Public API URL (no trailing slash)
        required: true
        default: https://hoopsai-api.fly.dev

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ inputs.api_url || 'https://hoopsai-api.fly.dev' }}
          VITE_BASE_PATH: /HoopsAI/
        run: |
          npm install
          npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
