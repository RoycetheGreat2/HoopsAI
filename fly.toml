# Fly.io — free hobby tier (API only). Install: https://fly.io/docs/hands-on/install-flyctl/
# Deploy: fly launch (once) then fly deploy
# Set secrets: fly secrets set CORS_ORIGINS=https://YOUR_USERNAME.github.io/HoopsAI/

app = "hoopsai-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Persist prediction_tracker.json across deploys (create once: fly volumes create hoopsai_data -r iad -s 1)
[mounts]
  source = "hoopsai_data"
  destination = "/app/data"
